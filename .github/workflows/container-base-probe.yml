name: container-base-probe

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Container image to probe"
        required: true
      platform:
        description: "Docker platform to run"
        required: false
        default: "linux/arm64"
      expected_os_version:
        description: "Required VERSION_ID from /etc/os-release; set empty to observe only"
        required: false
        default: "22.04"

permissions:
  contents: read

jobs:
  probe:
    name: probe image base
    runs-on: ubicloud-standard-30-arm
    timeout-minutes: 30
    steps:
      - name: Runner inventory
        run: |
          set -euxo pipefail
          uname -a
          nproc
          free -h
          docker version
          docker buildx version

      - name: Inspect manifest
        env:
          IMAGE: ${{ inputs.image }}
        run: |
          set -euxo pipefail
          docker buildx imagetools inspect "${IMAGE}"

      - name: Probe container runtime
        env:
          IMAGE: ${{ inputs.image }}
          PLATFORM: ${{ inputs.platform }}
          EXPECTED_OS_VERSION: ${{ inputs.expected_os_version }}
        run: |
          set -euxo pipefail
          docker run --rm --platform "${PLATFORM}" "${IMAGE}" bash -lc '
            set -euxo pipefail
            cat /etc/os-release
            . /etc/os-release
            echo "PROBE_OS_VERSION=${VERSION_ID}"
            echo "PROBE_PRETTY_NAME=${PRETTY_NAME}"
            ldd --version | head -n 1
            python3 - <<'"'"'PY'"'"'
import importlib.util
import platform
import sys

print("PYTHON", sys.version.replace("\n", " "))
print("MACHINE", platform.machine())
for name in ("torch", "sglang", "flashinfer", "sgl_kernel", "transformers"):
    spec = importlib.util.find_spec(name)
    print(f"MODULE_{name.upper()}={spec.origin if spec else None}")
PY
            if [ -n "'"${EXPECTED_OS_VERSION}"'" ] && [ "${VERSION_ID}" != "'"${EXPECTED_OS_VERSION}"'" ]; then
              echo "EXPECTED_OS_VERSION='"${EXPECTED_OS_VERSION}"' but container VERSION_ID=${VERSION_ID}" >&2
              exit 42
            fi
          '

